<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e1b4b">
    <meta name="description" content="منصة الأداء التربوي - إدارة شاملة للقسم">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="js/manifest.json">
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="منصة الأداء التربوي">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <title>منصة الأداء التربوي v10.0</title>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="load-icon">🎓</div>
        <div class="load-title">منصة الأداء التربوي</div>
        <div class="load-sub">ذ. عبد الحق جعايط · الإصدار 10.0 PWA</div>
        <div class="load-bar"><div class="load-fill"></div></div>
    </div>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen" style="display:none">
        <div class="login-box">
            <div class="login-icon">🔐</div>
            <h2 class="login-title">تسجيل الدخول</h2>
            <p class="login-sub">منصة الأداء التربوي</p>
            <div class="login-form">
                <div>
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" id="login-pass" class="form-control" 
                           placeholder="أدخل كلمة المرور..." 
                           onkeydown="if(event.key==='Enter')AuthMgr.login()">
                </div>
                <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px;margin-top:6px" 
                        onclick="AuthMgr.login()">
                    تسجيل الدخول 🚀
                </button>
            </div>
            <div style="font-size:10.5px;color:rgba(255,255,255,.22);margin-top:16px">
                v10.0 · PWA · IndexedDB · TaRL · AI Analytics
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div class="app-layout" id="appLayout" style="display:none">
        <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside class="sidebar no-print" id="appSidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">🎓</div>
                <div class="brand-text">
                    <h1>القيادة الصفية</h1>
                    <p>ذ. عبد الحق جعايط</p>
                </div>
                <button class="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="app-header no-print">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <h2 class="header-title" id="tabTitle">التحليل الفوري</h2>
                <div class="global-search">
                    <input type="text" list="dl-students" placeholder="بحث شامل..." 
                           onchange="handleGlobalSearch(this)">
                    <datalist id="dl-students"></datalist>
                </div>
                <div class="ctrl-group">
                    <label>السنة:</label>
                    <select id="globalYear" onchange="changeYear(this.value)">
                        <option value="2025-2026">2025-2026</option>
                        <option value="2026-2027">2026-2027</option>
                    </select>
                </div>
                <div class="ctrl-group">
                    <label>المستوى:</label>
                    <select id="globalLevel" onchange="changeLevel(this.value)">
                        <option value="6">السادس</option>
                        <option value="5">الخامس</option>
                        <option value="4">الرابع</option>
                    </select>
                </div>
                <div id="syncIndicator" style="font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r-full);background:var(--surface-2);border:1px solid var(--border)">
                    🔄
                </div>
                <button class="btn btn-primary btn-sm no-print" onclick="installPWA()">📱 تثبيت التطبيق</button>
            </header>

            <div id="smartAlertsContainer" class="no-print"></div>
            <div class="tab-container" id="tabContainer"></div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- AI Assistant Button -->
    <button id="ai-fab" onclick="AIAssistant.toggle()" title="المساعد الذكي">🤖</button>
    <div id="ai-chat-panel">
        <div class="ai-chat-header">
            <h4>🤖 المساعد التربوي</h4>
            <button onclick="AIAssistant.toggle()" style="background:none;border:none;color:#fff;cursor:pointer;">✕</button>
        </div>
        <div class="ai-chat-msgs" id="ai-msgs"></div>
        <div class="ai-chat-input">
            <input type="text" id="ai-input" placeholder="اكتب أمرك..." 
                   onkeydown="if(event.key==='Enter')AIAssistant.sendMsg()">
            <button class="ai-send-btn" onclick="AIAssistant.sendMsg()">➤</button>
        </div>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('js/service-worker.js')
                .then(reg => console.log('✅ Service Worker Registered'))
                .catch(err => console.error('❌ SW Error:', err));
        }
    </script>

    <!-- Main App Scripts -->
    <script src="js/modules/storage.js"></script>
    <script src="js/modules/auth.js"></script>
    <script src="js/modules/sync.js"></script>
    <script src="js/modules/engine.js"></script>
    <script src="js/modules/ui.js"></script>
    <script src="js/modules/journal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
